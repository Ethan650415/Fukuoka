name: Refresh Google Maps places

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install list reader
        run: pip install gmaps-list

      - name: Build places.json
        run: python scripts/refresh_places.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add places.json
          if git diff --cached --quiet; then
            echo "No place changes"
          else
            git commit -m "Refresh Google Maps places"
            git push
          fi
