name: Refresh Google Maps places

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Playwright and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Build places.json
        run: python scripts/refresh_places.py

      - name: Upload debug files on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: google-maps-debug
          path: debug-google-maps/
          if-no-files-found: ignore

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add places.json
          if git diff --cached --quiet; then
            echo "No place changes"
          else
            git commit -m "Refresh Google Maps places"
            git push
          fi
